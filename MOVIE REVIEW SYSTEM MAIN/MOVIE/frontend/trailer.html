{% extends "base.html" %}

{% block title %}Trailer - {{ movie.title }}{% endblock %}

{% block content %}
<div style="padding-top: 100px; max-width: 1200px; margin: 0 auto; padding-left: 6%; padding-right: 6%;">
    <div style="margin-bottom: 2rem;">
        <a href="/movie/{{ movie.id }}" style="color: var(--muted-text); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;">
            <i class="fas fa-arrow-left"></i> Back to {{ movie.title }}
        </a>
    </div>

    <div style="background: var(--card-background); padding: 2rem; border-radius: 20px; border: 1px solid var(--glass-border);">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">{{ movie.title }}</h1>
        <p style="color: var(--muted-text); margin-bottom: 2rem;">Official Trailer</p>

        <div style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; background: #000;">
            <iframe 
                src="{{ youtube_embed_url(movie.trailer_url) }}" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
            </iframe>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <form action="/watchlist/add/{{ movie.id }}" method="POST" style="display: inline;">
                <button type="submit" class="btn btn-outline"><i class="fas fa-plus"></i> Add to Watchlist</button>
            </form>
            <a href="/movie/{{ movie.id }}" class="btn btn-primary"><i class="fas fa-info-circle"></i> View Details & Reviews</a>
        </div>
    </div>
</div>
{% endblock %}
